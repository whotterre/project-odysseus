syntax = "proto3";

option java_package = "com.example.findnet.grpc";
option java_multiple_files = true;
option go_package = "./internal/grpc";

package telemetry;

// The core service for Mesh Telemetry
service MeshTelemetry {
  // Uplink a single report to the cloud
  rpc SubmitReport (MeshReport) returns (TelemetryResponse);

  // Bulk upload cached reports when the user gets back online
  rpc SyncBatch (ReportBatch) returns (TelemetryResponse);

  // Real-time stream for an active node to get network-wide stats
  rpc StreamNetworkUpdates (NodeIdentity) returns (stream NetworkStatus);
}

message MeshReport {
  string report_id = 1;          // Unique UUID generated by the sender
  string sender_public_key = 2;  // The full identity of the sender
  string content = 3;            // The message payload
  int64 timestamp = 4;           // Unix timestamp (milliseconds)
  
  double latitude = 5;
  double longitude = 6;
  
  int32 hop_count = 7;           // How many nodes this passed through
  int32 rssi = 8;                // Signal strength at the last hop
}

message ReportBatch {
  string node_identity = 1;
  repeated MeshReport reports = 2;
}

message NodeIdentity {
  string public_key = 1;
  string device_model = 2;
  string version = 3;
}

message TelemetryResponse {
  bool success = 1;
  string message = 2;
  int64 server_time = 3;
}

message NetworkStatus {
  int32 active_nodes_count = 1;
  int32 total_reports_relayed = 2;
  string system_alert = 3;
}